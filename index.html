<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Rejestracji</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="siatka-strony">
        <header class="naglowek">
            <h1>Mój Portal Internetowy</h1>
        </header>

        <main class="tresc-glowna">
            <div class="karta-rejestracji">
                <h2>Utwórz konto</h2>
                <form id="formularzReg">
                    <div class="grupa-formularza">
                        <label for="nazwa">Nazwa użytkownika:</label>
                        <input type="text" id="nazwa" required placeholder="Wpisz login...">
                    </div>
                    <div class="grupa-formularza">
                        <label for="haslo">Hasło:</label>
                        <input type="password" id="haslo" required placeholder="Wpisz hasło...">
                    </div>
                    <button type="submit">Zarejestruj się</button>
                </form>
            </div>
        </main>

        <aside class="panel-boczny">
            <h3>Zarejestrowani:</h3>
            <ul id="listaUzytkownikow"></ul>
            <button id="wyczyscBaze" class="przycisk-reset">Wyczyść listę</button>
        </aside>

        <footer class="stopka">
            <p>&copy; 2026 Projekt Programistyczny - Wszystkie prawa zastrzeżone</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
